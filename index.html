<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Khotmil Qur'an - PGRI Selogiri</title>

    <meta name="description" content="Portal pengumpulan dan pantauan progres dokumentasi Gerakan 1.000 Khotmil Qur'an 1447 H PGRI Cabang Selogiri.">
    <meta name="author" content="PGRI Cabang Selogiri">

    <meta property="og:title" content="Dashboard Khotmil Qur'an 1447 H - PGRI Selogiri">
    <meta property="og:description" content="Pantau progres dan kumpulkan dokumentasi Gerakan 1.000 Khotmil Qur'an tingkat sekolah se-Cabang Selogiri.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Logo_PGRI_%28Persatuan_Guru_Republik_Indonesia%29.svg/512px-Logo_PGRI_%28Persatuan_Guru_Republik_Indonesia%29.svg.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://onelabszz.github.io/slgkhatmil2026/"> 

    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Logo_PGRI_%28Persatuan_Guru_Republik_Indonesia%29.svg/512px-Logo_PGRI_%28Persatuan_Guru_Republik_Indonesia%29.svg.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4" style="max-width: 1100px;">
        
        <div class="text-center mb-4">
            <h2 class="text-success fw-bold">Dashboard Khotmil Qur'an 1447 H</h2>
            <p class="lead text-secondary">PGRI Cabang Selogiri</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Data Progres & Pembagian Juz</h5>
                <span id="progressCount" class="badge bg-success fs-6">Memuat...</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-bordered mb-0 align-middle" style="min-width: 900px;">
                        <thead class="table-light text-center">
                            <tr>
                                <th width="5%">No</th>
                                <th width="15%">Nama Sekolah</th>
                                <th width="5%">Juz</th>
                                <th width="15%">Nama Surat</th>
                                <th width="10%">Status</th>
                                <th width="20%">Waktu Kirim</th>
                                <th width="30%">Aksi (Kirim Dokumentasi)</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="7" class="text-center py-4">Sedang memuat data dari database...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-3 text-muted" style="font-size: 0.85rem;">
            &copy; 2026 PGRI Cabang Selogiri. Sistem Informasi Terpadu.
        </div>

    </div>

    <script>
        // ==========================================
        // MASUKKAN URL WEB APP GAS BAPAK DI SINI
        // ==========================================
        const gasUrl = "https://script.google.com/macros/s/AKfycbwEiRT9B1tdkxEQW6eI6HUg60qRUtVeiuhUM6dU0zygjO0QqJjZb23hWjLjqSEuBKa9cQ/exec";

        function loadData() {
            fetch(gasUrl)
                .then(response => response.json())
                .then(data => renderTable(data))
                .catch(error => {
                    document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="text-center text-danger">Gagal memuat data. Pastikan koneksi internet stabil.</td></tr>`;
                });
        }

        function renderTable(dataSekolah) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let sudahKirim = 0;

            dataSekolah.forEach((item, index) => {
                const isSudah = item.status.toLowerCase() === 'sudah';
                if (isSudah) sudahKirim++;
                
                const statusBadge = isSudah ? '<span class="badge bg-success">Sudah</span>' : '<span class="badge bg-danger">Belum</span>';
                const rowClass = isSudah ? 'table-success' : '';
                
                let actionHtml = '';
                if (isSudah) {
                    actionHtml = `<button class="btn btn-sm btn-outline-success w-100" disabled>Selesai Terkirim</button>`;
                } else {
                    actionHtml = `
                        <div class="input-group input-group-sm">
                            <input type="file" class="form-control" id="file_${index}" accept="image/*,video/*">
                            <button class="btn btn-primary" type="button" onclick="handleUpload('${item.sekolah}', 'file_${index}', 'btn_${index}')" id="btn_${index}">Kirim</button>
                        </div>
                    `;
                }

                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td class="text-center">${index + 1}</td>
                        <td class="fw-bold">${item.sekolah}</td>
                        <td class="text-center fw-bold text-primary">${item.juz}</td>
                        <td class="text-center text-secondary">${item.surat}</td>
                        <td class="text-center">${statusBadge}</td>
                        <td class="text-center text-muted" style="font-size: 0.85em;">${item.waktu}</td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
            });

            document.getElementById('progressCount').innerText = `${sudahKirim} dari ${dataSekolah.length} Selesai`;
        }

        function handleUpload(namaSekolah, inputId, btnId) {
            const fileInput = document.getElementById(inputId);
            const btnSubmit = document.getElementById(btnId);

            if (!fileInput.files || fileInput.files.length === 0) {
                alert(`Silakan pilih file terlebih dahulu untuk ${namaSekolah}.`);
                return;
            }

            const file = fileInput.files[0];
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Loading...`;

            if (file.type.startsWith('image/')) {
                compressAndSendImage(file, namaSekolah, btnSubmit);
            } else {
                if (file.size > 40 * 1024 * 1024) {
                    alert("Ukuran video terlalu besar! Maksimal 40MB.");
                    resetButton(btnSubmit);
                    return;
                }
                sendUncompressedFile(file, namaSekolah, btnSubmit);
            }
        }

        function compressAndSendImage(file, namaSekolah, btnSubmit) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1280;
                    const MAX_HEIGHT = 1280;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    const base64Data = dataUrl.split(',')[1];
                    const newFileName = file.name.split('.')[0] + ".jpg";

                    sendToGAS(base64Data, newFileName, 'image/jpeg', namaSekolah, btnSubmit);
                }
            };
        }

        function sendUncompressedFile(file, namaSekolah, btnSubmit) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const base64Data = event.target.result.split(',')[1]; 
                sendToGAS(base64Data, file.name, file.type, namaSekolah, btnSubmit);
            };
        }

        function sendToGAS(base64Data, fileName, mimeType, namaSekolah, btnSubmit) {
            const payload = {
                fileData: base64Data,
                fileName: fileName,
                mimeType: mimeType,
                asalSekolah: namaSekolah
            };

            fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload) })
            .then(response => response.json())
            .then(data => {
                if (data.result === 'success') {
                    alert(`Alhamdulillah, dokumentasi ${namaSekolah} berhasil terkirim!`);
                    loadData(); 
                } else {
                    alert(`Gagal mengirim data: ${data.message}`);
                    resetButton(btnSubmit);
                }
            })
            .catch(error => {
                alert("Terjadi kesalahan jaringan. Coba lagi.");
                resetButton(btnSubmit);
            });
        }

        function resetButton(btn) {
            btn.disabled = false;
            btn.innerHTML = "Kirim";
        }

        loadData();
    </script>
</body>
</html>
