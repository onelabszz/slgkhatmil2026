<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Khotmil Qur'an - PGRI Selogiri</title>
    
    <meta name="description" content="Portal pengumpulan dan pantauan progres dokumentasi Gerakan 1.000 Khotmil Qur'an 1447 H PGRI Cabang Selogiri.">
    <meta name="author" content="PGRI Cabang Selogiri">
    <meta property="og:title" content="Dashboard Khotmil Qur'an 1447 H - PGRI Selogiri">
    <meta property="og:description" content="Pantau progres dan kumpulkan dokumentasi Gerakan 1.000 Khotmil Qur'an tingkat sekolah se-Cabang Selogiri.">
    <meta property="og:image" content="https://api.iconify.design/lucide:book-open-text.png?color=%23198754&width=512&height=512">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://onelabszz.github.io/slgkhatmil2026/"> 

    <link rel="icon" href="https://api.iconify.design/lucide:book-open-text.svg?color=%23198754" type="image/svg+xml">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* PERBAIKAN HEADER PRESISI & STICKY */
        .table-responsive {
            border-radius: 0.375rem;
            max-height: 75vh; 
            overflow-y: auto;
        }
        
        /* Memastikan header tidak transparan dan garisnya tegas */
        thead th {
            position: sticky;
            top: 0; 
            background-color: #f8f9fa !important; /* Warna abu-abu solid Bootstrap */
            z-index: 10;
            box-shadow: inset 0 -2px 0 #dee2e6; /* Garis batas bawah yang lebih presisi */
            vertical-align: middle;
            white-space: nowrap; /* Mencegah teks header turun ke baris baru */
        }

        /* Penyesuaian Jarak Sticky Navbar Page vs Table */
        @media (min-width: 992px) {
            .table-responsive {
                max-height: calc(100vh - 220px); /* Area scroll tabel lebih dinamis di laptop */
            }
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar sticky-top bg-white shadow-sm border-bottom py-3" style="z-index: 1050;">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 1100px;">
            <div class="d-flex align-items-center">
                <i data-lucide="book-open-text" class="text-success me-2" style="width: 28px; height: 28px;"></i>
                <div>
                    <h1 class="h5 mb-0 text-success fw-bold d-none d-sm-block">Khotmil Qur'an PGRI Selogiri</h1>
                    <h1 class="h5 mb-0 text-success fw-bold d-block d-sm-none">Khotmil 1447 H</h1>
                </div>
            </div>
            
            <div class="d-flex align-items-center">
                <span id="progressBadgeNav" class="badge bg-success me-2 me-sm-3 fs-6 py-2 px-3 shadow-sm">Memuat...</span>
                <button class="btn btn-outline-success d-flex align-items-center fw-bold shadow-sm" onclick="loadData()" id="topRefreshBtn">
                    <i data-lucide="refresh-cw" class="me-0 me-sm-2" id="refreshIcon" style="width: 18px; height: 18px;"></i> 
                    <span class="d-none d-sm-inline">Refresh</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5" style="max-width: 1100px;">
        
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white p-3">
                <h5 class="mb-0 d-flex align-items-center fs-6 fs-md-5">
                    <i data-lucide="bar-chart-2" class="me-2 text-warning" style="width: 20px; height: 20px;"></i> 
                    Data Progres & Pembagian Juz
                </h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-bordered mb-0 align-middle" style="min-width: 950px;">
                        <thead class="table-light text-secondary">
                            <tr>
                                <th width="5%" class="text-center py-3">No</th>
                                <th width="28%" class="text-start ps-3 py-3">Nama Sekolah</th>
                                <th width="8%" class="text-center py-3">Juz</th>
                                <th width="20%" class="text-center py-3">Nama Surat</th>
                                <th width="10%" class="text-center py-3">Status</th>
                                <th width="15%" class="text-center py-3">Waktu Kirim</th>
                                <th width="14%" class="text-center py-3">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="7" class="text-center py-5">
                                    <div class="spinner-border text-success mb-2" role="status"></div>
                                    <p class="text-muted mb-0">Sedang memuat sinkronisasi data...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4 text-muted" style="font-size: 0.85rem;">
            &copy; 2026 Persatuan Guru Republik Indonesia (PGRI) Cabang Selogiri.<br>Sistem Informasi Terpadu.
        </div>

    </div>

    <script>
        lucide.createIcons();

        // ==========================================
        // KONFIGURASI URL API
        // ==========================================
        const gasUrl = "https://script.google.com/macros/s/AKfycbwEiRT9B1tdkxEQW6eI6HUg60qRUtVeiuhUM6dU0zygjO0QqJjZb23hWjLjqSEuBKa9cQ/exec";
        const formBaseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfNI-psI3B5lP0yOVRWko4qyNmP8PdRcZq6G6T-LB4aDxJOwA/viewform?usp=pp_url&entry.990484013=";
        // ==========================================

        function loadData() {
            const refreshBtn = document.getElementById('topRefreshBtn');
            const badgeNav = document.getElementById('progressBadgeNav');
            
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-0 me-sm-2" role="status" aria-hidden="true"></span> <span class="d-none d-sm-inline">Proses...</span>`;
            badgeNav.innerText = "Sinkronisasi...";
            badgeNav.classList.replace('bg-success', 'bg-warning');
            badgeNav.classList.add('text-dark');
            
            const tbody = document.getElementById('tableBody');
            if (tbody.innerHTML.trim() === '') {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-success mb-2" role="status"></div><p class="text-muted mb-0">Memuat data terbaru...</p></td></tr>`;
            }
            
            fetch(gasUrl)
                .then(response => response.json())
                .then(data => {
                    renderTable(data);
                    resetRefreshButton();
                })
                .catch(error => {
                    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger"><i data-lucide="wifi-off" class="me-2 mb-2" style="width:32px; height:32px;"></i><br>Gagal memuat data. Periksa koneksi internet Anda.</td></tr>`;
                    resetRefreshButton(true);
                    lucide.createIcons();
                });
        }

        function renderTable(dataSekolah) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let sudahKirim = 0;

            dataSekolah.forEach((item, index) => {
                const isSudah = item.status.toLowerCase() === 'sudah';
                if (isSudah) sudahKirim++;
                
                const statusBadge = isSudah ? '<span class="badge bg-success"><i data-lucide="check-circle-2" style="width: 14px; height: 14px;" class="me-1"></i>Sudah</span>' : '<span class="badge bg-danger"><i data-lucide="clock" style="width: 14px; height: 14px;" class="me-1"></i>Belum</span>';
                const rowClass = isSudah ? 'table-success' : '';
                
                let actionHtml = '';
                if (isSudah) {
                    actionHtml = `<button class="btn btn-sm btn-success w-100 disabled d-flex justify-content-center align-items-center shadow-sm"><i data-lucide="check" style="width: 16px; height: 16px;" class="me-1"></i> Selesai</button>`;
                } else {
                    const prefilledUrl = formBaseUrl + encodeURIComponent(item.sekolah);
                    actionHtml = `<a href="${prefilledUrl}" target="_blank" class="btn btn-sm btn-primary w-100 d-flex justify-content-center align-items-center shadow-sm"><i data-lucide="upload-cloud" style="width: 16px; height: 16px;" class="me-2"></i>Kirim</a>`;
                }

                // Penyesuaian class di sini agar sejajar (presisi) dengan header
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td class="text-center text-muted align-middle">${index + 1}</td>
                        <td class="text-start fw-bold ps-3 align-middle">${item.sekolah}</td>
                        <td class="text-center fw-bold text-primary fs-6 align-middle">${item.juz}</td>
                        <td class="text-center text-secondary align-middle">${item.surat}</td>
                        <td class="text-center align-middle">${statusBadge}</td>
                        <td class="text-center text-muted align-middle" style="font-size: 0.85em;">${item.waktu}</td>
                        <td class="align-middle px-3">${actionHtml}</td>
                    </tr>
                `;
            });

            const badgeNav = document.getElementById('progressBadgeNav');
            badgeNav.innerHTML = `<i data-lucide="pie-chart" class="me-1" style="width:16px; height:16px;"></i> ${sudahKirim} / ${dataSekolah.length} Selesai`;
            
            lucide.createIcons();
        }

        function resetRefreshButton(isError = false) {
            const refreshBtn = document.getElementById('topRefreshBtn');
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = `<i data-lucide="refresh-cw" class="me-0 me-sm-2" id="refreshIcon" style="width: 18px; height: 18px;"></i> <span class="d-none d-sm-inline">Refresh</span>`;
            
            const badgeNav = document.getElementById('progressBadgeNav');
            badgeNav.classList.remove('bg-warning', 'text-dark', 'bg-danger');
            badgeNav.classList.add(isError ? 'bg-danger' : 'bg-success');
            if(isError) badgeNav.innerText = "Error";
            
            lucide.createIcons();
        }

        loadData();
    </script>
</body>
</html>
